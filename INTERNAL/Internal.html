<!DOCTYPE html>
<html>
<head>
<style>
/* Internal CSS using element name */
body{
    background-color: lavender;
    text-align: center;
}

h2{
    font-style: italic;
    font-size: 30px;
    color: #80dbf0;
}

p{
    font-size: 20px;
}

/* Internal CSS using class name */
.blue{
    color: violet;
}

.red{
    color: brown;
}

.green{
    color: darkmagenta;
}
</style>
</head>

<body>
    <h2>Learning HTML with Internal CSS</h2>
    <h2>Student Management</h2>

    <p class="blue">Student Registration Portal</p>
    <p class="red">Manage student records easily</p>
    <p class="green">Track academic progress</p>
</body>
</html>
