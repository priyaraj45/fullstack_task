<!DOCTYPE html>
<html>
<head>
    <title>Login Form</title>

    <style>
        body{
            font-family: Arial, sans-serif;
            background-color:black;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
            margin:0;
        }

        .login-box{
            background:white;
            padding:30px;
            border-radius:10px;
            box-shadow:0 4px 15px rgba(0,0,0,0.2);
            width:300px;
        }

        h2{
            text-align:center;
            margin-bottom:20px;
        }

        label{
            font-weight:bold;
        }

        input[type="email"],
        input[type="password"]{
            width:100%;
            padding:10px;
            margin-top:5px;
            margin-bottom:15px;
            border:1px solid #ccc;
            border-radius:5px;
            box-sizing:border-box;
        }

        input[type="submit"]{
            width:100%;
            padding:10px;
            background:#3498db;
            color:white;
            border:none;
            border-radius:5px;
            cursor:pointer;
            font-size:16px;
        }

        input[type="submit"]:hover{
            background:#2980b9;
        }
    </style>
</head>

<body>

<div class="login-box">
    <h2>Login</h2>

    <form>
        <label>Enter your Email Address</label><br>
        <input type="email" name="uname" autofocus required>

        <label>Enter your Password</label><br>
        <input type="password" name="pass" required>

        <input type="submit" value="Login">
    </form>
</div>

</body>
</html>
