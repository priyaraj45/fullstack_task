<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vertical Menu</title>
</head>
<body>

<style>
body{
    margin:0;
    padding:20px;
    background-color:azure;
    font-family:Arial, sans-serif;
}

/* Sidebar Menu */
.menu{
    list-style:none;
    width:250px;
    padding:0;
    margin:0;
    background:linear-gradient(180deg,#2c3e50,#34495e);
    border-radius:15px;
    overflow:hidden;
    box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

/* Header */
.menu-header{
    background:#1f2d3d;
    color:white;
    text-align:center;
    font-size:22px;
    font-weight:bold;
    padding:18px;
    letter-spacing:1px;
}

/* Menu Items */
.menu li{
    border-bottom:1px solid rgba(255,255,255,0.1);
}

.menu li:last-child{
    border-bottom:none;
}

.menu a{
    display:block;
    color:white;
    text-decoration:none;
    padding:18px 20px;
    font-size:18px;
    transition:all 0.3s ease;
}

/* Hover Effect */
.menu a:hover{
    background:#3498db;
    padding-left:30px;
}

/* Active Page */
.active{
    border-left:5px solid #00d4ff;
    background:#355c7d;
}

/* Badge */
.badge{
    float:right;
    background:#ff4757;
    color:white;
    font-size:12px;
    padding:4px 8px;
    border-radius:20px;
}
</style>
</head>

<body>
    <h2>Modern Vertical Menu</h2>

<ul class="menu">

    <div class="menu-header">
        Dashboard
    </div>

    <li>
        <a href="#">🏠 Home</a>
    </li>

    <li>
        <a href="#">ℹ️ About</a>
    </li>

    <li>
        <a href="#">🛠 Services</a>
    </li>

    <li>
        <a href="#">
            📞 Contact
            
        </a>
    </li>

</ul>


    
</body>
</html>
