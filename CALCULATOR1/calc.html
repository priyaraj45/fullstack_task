<!DOCTYPE html>
<html>
<head>
<title>Calculator</title>

<style>
body{
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    background:#e5e5e5;
}

.calculator{
    background:black;
    padding:20px;
    border-radius:20px;
    width:320px;
}

#display{
    width:100%;
    height:70px;
    font-size:40px;
    text-align:right;
    border:none;
    background:black;
    color:white;
    margin-bottom:10px;
}

.buttons{
    display:grid;
    grid-template-columns:repeat(4,70px);
    gap:10px;
}

button{
    width:70px;
    height:70px;
    border:none;
    border-radius:50%;
    font-size:25px;
    cursor:pointer;
    background:#333;
    color:white;
}

.gray{
    background:#b5b5b5;
    color:black;
}

.orange{
    background:#ff9f0a;
}

.zero{
    width:150px;
    border-radius:35px;
    grid-column:span 2;
}
</style>

</head>

<body>

<div class="calculator">

<input type="text" id="display">

<div class="buttons">

<button class="gray" onclick="clearDisplay()">AC</button>
<button class="gray" onclick="deleteLast()">⌫</button>
<button class="gray" onclick="appendValue('%')">%</button>
<button class="orange" onclick="appendValue('/')">÷</button>

<button onclick="appendValue('7')">7</button>
<button onclick="appendValue('8')">8</button>
<button onclick="appendValue('9')">9</button>
<button class="orange" onclick="appendValue('*')">×</button>

<button onclick="appendValue('4')">4</button>
<button onclick="appendValue('5')">5</button>
<button onclick="appendValue('6')">6</button>
<button class="orange" onclick="appendValue('-')">−</button>

<button onclick="appendValue('1')">1</button>
<button onclick="appendValue('2')">2</button>
<button onclick="appendValue('3')">3</button>
<button class="orange" onclick="appendValue('+')">+</button>

<button class="zero" onclick="appendValue('0')">0</button>
<button onclick="appendValue('.')">.</button>
<button class="orange" onclick="calculate()">=</button>

</div>

</div>

<script>

function appendValue(value){
document.getElementById("display").value += value;
}

function clearDisplay(){
document.getElementById("display").value = "";
}

function deleteLast(){
let display = document.getElementById("display");
display.value = display.value.slice(0,-1);
}

function calculate(){
let display = document.getElementById("display");
try{
display.value = eval(display.value);
}
catch{
display.value = "Error";
}
}

</script>

</body>
</html>
